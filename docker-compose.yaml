services:
  server:
    image: nginx:stable-alpine3.19
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - hology
    restart: always

  app:
    build:
      dockerfile: ./deploy/Dockerfile
      context: .
    volumes:
      - ./.env:/app/.env:ro
      - ./data/logs:/app/data/logs
    networks:
      - hology
    restart: on-failure

networks:
  hology:
    driver: bridge
