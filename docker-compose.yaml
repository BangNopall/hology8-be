services:
  server:
    image: nginx:stable-alpine3.19
    container_name: holoserver
    ports: 
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt     # mount certs untuk SSL
    depends_on:
      - app
    networks:
      - hology
    restart: always
    logging:
      driver: loki
      options:
        loki-url: http://31.97.223.139:3100/loki/api/v1/push
        loki-retries: 5
        loki-batch-size: 400

  app:
    build: 
      dockerfile: ./deploy/Dockerfile
      context: .
    environment:
      - PORT=8080
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/logs:/app/data/logs
    networks:
      - hology
    restart: on-failure
    logging:
      driver: loki
      options:
        loki-url: http://31.97.223.139:3100/loki/api/v1/push
        loki-retries: 5
        loki-batch-size: 400

  db:
    image: postgres:16.1
    container_name: postgresdb
    environment:
      - POSTGRES_USER=${DB_USER} 
      - POSTGRES_PASSWORD=${DB_PASS} 
      - POSTGRES_DB=${DB_NAME} 
      - TZ=Asia/Jakarta
      - PORT=${DB_PORT}
    ports:
      - "5432:5432"
    volumes:
      - postgres_holo_data:/var/lib/postgresql/data 
    networks:
      - hology
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U ${DB_USER} -d ${DB_NAME}'"]
      start_interval: 5s
      start_period: 60s
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: loki
      options:
        loki-url: http://31.97.223.139:3100/loki/api/v1/push
        loki-retries: 5
        loki-batch-size: 400

  redis:
    image: redis:7.2.5-alpine
    container_name: rediscache
    environment:
      - REDIS_PASSWORD=${REDIS_PASS}
      - REDIS_PORT=${REDIS_PORT}
    networks: 
      - hology
    healthcheck:
      test:  ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "--raw", "incr", "ping" ]
      start_interval: 5s
      start_period: 60s
      interval: 15s
      timeout: 5s
      retries: 3
    
networks:
  hology:
    driver: bridge 

volumes:
  postgres_holo_data: 
    driver: local
