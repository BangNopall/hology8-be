securityDefinitions:
  ApiKeyAuth:
    description: 'API Key for accessing all endpoints. Type: Key TOKEN'
    in: header
    name: x-api-key
    type: apiKey
  UserAuth:
    description: 'API Key for accessing protected user and admin endpoints. Type:
      Bearer TOKEN'
    in: header
    name: Authorization
    type: apiKey
