basePath: /api/v1
definitions:
  dto.AdminLogin:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  dto.AdminLoginResponse:
    properties:
      token:
        type: string
    type: object
  dto.AnnouncementRequest:
    properties:
      adminID:
        type: string
      competition_id:
        type: integer
      description:
        type: string
      id:
        type: integer
      team_id:
        type: string
    required:
    - description
    type: object
  dto.AnnouncementResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      updated_at:
        type: string
    type: object
  dto.CompetitionRequest:
    properties:
      competition_desc:
        type: string
      competition_link_wa:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  dto.CompetitionResponse:
    properties:
      announcements:
        items:
          $ref: '#/definitions/dto.AnnouncementResponse'
        type: array
      competition_desc:
        type: string
      competition_link_wa:
        type: string
      id:
        type: integer
      name:
        type: string
      teams:
        items:
          $ref: '#/definitions/dto.TeamResponse'
        type: array
    type: object
  dto.EmailMessage:
    properties:
      content:
        type: string
      name:
        items:
          type: string
        type: array
      subject:
        type: string
    type: object
  dto.LogResponse:
    properties:
      action:
        type: string
      created_at:
        type: string
      fullname:
        type: string
      id:
        type: integer
    type: object
  dto.PaginationResponse:
    properties:
      page:
        type: integer
      total_pages:
        type: integer
    type: object
  dto.PartnerResponse:
    properties:
      id:
        type: integer
      link:
        type: string
      name:
        type: string
    type: object
  dto.PartnerTypeResponse:
    properties:
      id:
        type: integer
      partner_type_name:
        type: string
    type: object
  dto.PartnersResponse:
    properties:
      partners:
        items:
          $ref: '#/definitions/dto.PartnerResponse'
        type: array
    type: object
  dto.PresenceCheckResponse:
    properties:
      created_at:
        type: string
      exists:
        type: boolean
      user_id:
        type: string
    type: object
  dto.PresenceCreateRequest:
    properties:
      user_id:
        type: string
    required:
    - user_id
    type: object
  dto.PresenceCreateResponse:
    properties:
      created_at:
        type: string
      fullname:
        type: string
      team_name:
        type: string
      user_id:
        type: string
    type: object
  dto.PresenceListItem:
    properties:
      created_at:
        type: string
      fullname:
        type: string
      team_name:
        type: string
      user_id:
        type: string
    type: object
  dto.PresenceListResponse:
    properties:
      pagination:
        $ref: '#/definitions/dto.PaginationResponse'
      presences:
        items:
          $ref: '#/definitions/dto.PresenceListItem'
        type: array
    type: object
  dto.ProvinceResponse:
    properties:
      id:
        type: integer
      province_name:
        type: string
    type: object
  dto.TeamCounter:
    properties:
      disqualified_team:
        type: integer
      eliminated_team:
        type: integer
      final_team:
        type: integer
      onhold_team:
        type: integer
      verified_team:
        type: integer
    type: object
  dto.TeamNUnivCounter:
    properties:
      team_counter:
        type: integer
      univ_counter:
        type: integer
    type: object
  dto.TeamPaginationResponse:
    properties:
      counter:
        $ref: '#/definitions/dto.TeamCounter'
      pagination:
        $ref: '#/definitions/dto.PaginationResponse'
      teams:
        items:
          $ref: '#/definitions/dto.TeamResponse'
        type: array
    type: object
  dto.TeamRegister:
    properties:
      competition_id:
        type: integer
      team_name:
        maxLength: 50
        minLength: 5
        type: string
    required:
    - competition_id
    - team_name
    type: object
  dto.TeamResponse:
    properties:
      announcements:
        items:
          $ref: '#/definitions/dto.AnnouncementResponse'
        type: array
      bank_account_number:
        type: string
      bank_name:
        type: string
      competition:
        $ref: '#/definitions/dto.CompetitionResponse'
      created_at:
        type: string
      id:
        type: string
      join_token:
        type: string
      leader:
        $ref: '#/definitions/dto.UserResponse'
      members:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
      payment_proof_link:
        type: string
      phase:
        $ref: '#/definitions/enums.Phase'
      ppt_link:
        type: string
      proposal_doc_link:
        type: string
      sender_payment_name:
        type: string
      statement_letter_link:
        type: string
      status:
        $ref: '#/definitions/enums.Status'
      team_name:
        type: string
      twibbon_proof_link:
        type: string
      university:
        $ref: '#/definitions/dto.UniversityResponse'
      university_id:
        type: integer
      updated_at:
        type: string
      video_link:
        type: string
      voucher:
        type: boolean
      winner_place:
        $ref: '#/definitions/enums.WinnerPlace'
    type: object
  dto.TeamUpdate:
    properties:
      bank_account_number:
        maxLength: 60
        type: string
      bank_name:
        maxLength: 50
        type: string
      leader_id:
        type: string
      phase:
        $ref: '#/definitions/enums.Phase'
      ppt_link:
        maxLength: 255
        type: string
      sender_payment_name:
        maxLength: 60
        type: string
      status:
        $ref: '#/definitions/enums.Status'
      university_id:
        type: integer
      video_link:
        maxLength: 255
        type: string
      winner_place:
        $ref: '#/definitions/enums.WinnerPlace'
    type: object
  dto.UniversityResponse:
    properties:
      id:
        type: integer
      university_name:
        type: string
    type: object
  dto.UserForgotPassword:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.UserLogin:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.UserLoginResponse:
    properties:
      token:
        type: string
    type: object
  dto.UserOuathLink:
    properties:
      redirect_link:
        type: string
    type: object
  dto.UserPaginationResponse:
    properties:
      pagination:
        $ref: '#/definitions/dto.PaginationResponse'
      users:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
    type: object
  dto.UserRegister:
    properties:
      confirm_password:
        maxLength: 40
        minLength: 6
        type: string
      email:
        type: string
      password:
        maxLength: 40
        minLength: 6
        type: string
    required:
    - confirm_password
    - email
    - password
    type: object
  dto.UserResetPassword:
    properties:
      confirm_password:
        maxLength: 20
        minLength: 6
        type: string
      password:
        maxLength: 20
        minLength: 6
        type: string
    required:
    - confirm_password
    - password
    type: object
  dto.UserResponse:
    properties:
      birth_date:
        type: string
      city:
        type: string
      email:
        type: string
      email_is_verified:
        type: boolean
      email_verified_token:
        type: string
      follow_proof_link:
        type: string
      forgot_password_token:
        type: string
      fullname:
        type: string
      home_address:
        type: string
      id:
        type: string
      id_discord:
        type: string
      id_line:
        type: string
      id_student:
        type: string
      ktm_image_link:
        type: string
      password:
        type: string
      province:
        $ref: '#/definitions/dto.ProvinceResponse'
      province_id:
        type: integer
      share_proof_link:
        type: string
      university:
        $ref: '#/definitions/dto.UniversityResponse'
      university_id:
        type: integer
      wa_number:
        type: string
    type: object
  dto.UserTeamsResponse:
    properties:
      teams:
        items:
          $ref: '#/definitions/dto.TeamResponse'
        type: array
    type: object
  dto.UserUpdate:
    properties:
      birth_date:
        type: string
      city:
        maxLength: 70
        type: string
      fullname:
        maxLength: 100
        type: string
      id_discord:
        maxLength: 70
        type: string
      id_line:
        maxLength: 70
        type: string
      id_student:
        maxLength: 70
        type: string
      password:
        type: string
      province_id:
        type: integer
      university_id:
        type: integer
      wa_number:
        type: string
    type: object
  dto.VoucherRedeem:
    properties:
      id:
        type: string
      team_id:
        type: string
    type: object
  dto.VoucherRequest:
    properties:
      id:
        type: string
    type: object
  dto.VoucherResponse:
    properties:
      id:
        type: string
      team_id:
        type: string
    type: object
  enums.Phase:
    enum:
    - Elimination
    - Eliminated
    - Final
    - Disqualified
    type: string
    x-enum-varnames:
    - Elimination
    - Eliminated
    - Final
    - Disqualified
  enums.Status:
    enum:
    - Waiting
    - Rejected
    - Verified
    type: string
    x-enum-varnames:
    - Waiting
    - Rejected
    - Verified
  enums.WinnerPlace:
    enum:
    - First
    - Second
    - Third
    - Default
    type: string
    x-enum-varnames:
    - First
    - Second
    - Third
    - Default
  response.ErrorResponse:
    properties:
      code:
        type: integer
      error:
        type: string
      message:
        type: string
      status:
        $ref: '#/definitions/response.Status'
    type: object
  response.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
      status:
        $ref: '#/definitions/response.Status'
    type: object
  response.Status:
    enum:
    - success
    - fail
    - error
    type: string
    x-enum-varnames:
    - Success
    - Fail
    - Error
host: api.hology.id
info:
  contact: {}
  description: This is Hology 8 API Documentation
  title: Hology 8 API
  version: "1.0"
paths:
  /admins/login:
    post:
      consumes:
      - application/json
      description: Login for admin
      parameters:
      - description: Admin login
        in: body
        name: login
        required: true
        schema:
          $ref: '#/definitions/dto.AdminLogin'
      produces:
      - application/json
      responses:
        "200":
          description: Login success
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Status Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Status Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "408":
          description: Status Request Timeout
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Status Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Login
      tags:
      - Admins
  /admins/send-email:
    post:
      consumes:
      - application/json
      description: Send email to all users/user who join a competition/a leader of
        a team
      parameters:
      - description: 'Relation to loaded. Available: all, team, competition. Usage
          example: ?to=all'
        in: query
        name: to
        required: true
        type: string
      - description: Email message. name is required if to is team/competition
        in: body
        name: email
        required: true
        schema:
          $ref: '#/definitions/dto.EmailMessage'
      produces:
      - application/json
      responses:
        "200":
          description: Email sent
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AdminLoginResponse'
              type: object
        "400":
          description: Status Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Status Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "408":
          description: Status Request Timeout
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Status Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - UserAuth: []
      summary: Send Email
      tags:
      - Admins
  /announcements:
    get:
      description: Fetch announcements by to. If team_id and competition_id is empty,
        then it will fetch all announcements to all users
      parameters:
      - description: Team ID
        in: query
        name: team_id
        type: string
      - description: Competition ID
        in: query
        name: competition_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.AnnouncementResponse'
                  type: array
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - UserAuth: []
      summary: Fetch announcements by To
      tags:
      - Announcements
    post:
      consumes:
      - application/json
      description: Create announcement only by admin
      parameters:
      - description: Announcement request body
        in: body
        name: AnnouncementRequest
        required: true
        schema:
          $ref: '#/definitions/dto.AnnouncementRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Team/Competition not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - UserAuth: []
      summary: Create announcement
      tags:
      - Announcements
  /announcements/{id}:
    delete:
      description: Delete announcement only by admin
      parameters:
      - description: Announcement ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Announcement/Team/Competition not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - UserAuth: []
      summary: Delete announcement
      tags:
      - Announcements
    put:
      description: Update announcement only by admin
      parameters:
      - description: Announcement ID
        in: path
        name: id
        required: true
        type: integer
      - description: Announcement request body
        in: body
        name: AnnouncementRequest
        required: true
        schema:
          $ref: '#/definitions/dto.AnnouncementRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Announcement/Team/Competition not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - UserAuth: []
      summary: Update announcement
      tags:
      - Announcements
  /competitions:
    get:
      description: Fetch all available competitions data
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.CompetitionResponse'
                  type: array
              type: object
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Fetch all competitions data
      tags:
      - Competitions
  /competitions/{id}:
    get:
      description: Fetch one competition data by ID
      parameters:
      - description: Competition ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.CompetitionResponse'
              type: object
        "404":
          description: Competition with requested ID not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Fetch competition data by ID
      tags:
      - Competitions
    put:
      consumes:
      - application/json
      description: Update competition data
      parameters:
      - description: Competition ID
        in: path
        name: id
        required: true
        type: integer
      - description: Competition Payload
        in: body
        name: CompetitionPayload
        required: true
        schema:
          $ref: '#/definitions/dto.CompetitionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: Bad data request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized Admin
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Competition with requested ID not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - UserAuth: []
      - ApiKeyAuth: []
      summary: Update competition data  (Admin Service)
      tags:
      - Competitions
  /competitions/resource/admin:
    get:
      description: Fetch all available competitions data
      parameters:
      - description: 'Relation to loaded. Available: team,announcement. Usage: ?relation=team'
        in: query
        name: relation
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.CompetitionResponse'
                  type: array
              type: object
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - UserAuth: []
      summary: Fetch all competitions data
      tags:
      - Competitions
  /competitions/resource/admin{id}:
    get:
      description: Fetch one competition data by ID
      parameters:
      - description: Competition ID
        in: path
        name: id
        required: true
        type: integer
      - description: 'Relation to loaded. Available: team,announcement. Usage: ?relation=team'
        in: query
        name: relation
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.CompetitionResponse'
              type: object
        "404":
          description: Competition with requested ID not found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - UserAuth: []
      summary: Fetch competition data by ID
      tags:
      - Competitions
  /logs:
    get:
      description: Fetch all applications logs
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.LogResponse'
                  type: array
              type: object
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - UserAuth: []
      - ApiKeyAuth: []
      summary: Fetch all applications logs only by Admin
      tags:
      - Logs
  /partners:
    get:
      description: Fetch all available partners data
      parameters:
      - description: Partner type ID
        in: query
        name: partner_type_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.PartnersResponse'
              type: object
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Fetch all partners data
      tags:
      - Partners
    post:
      description: Create new partner
      parameters:
      - description: Partner name
        in: formData
        name: name
        required: true
        type: string
      - description: Partner type ID
        in: formData
        name: partner_type_id
        required: true
        type: integer
      - description: Partner image file
        in: formData
        name: image_file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.PartnerResponse'
              type: object
        "400":
          description: Invalid request payload
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - UserAuth: []
      summary: Create new partner
      tags:
      - Partners
  /partners/{id}:
    delete:
      description: Delete partner data
      parameters:
      - description: Partner ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            $ref: '#/definitions/response.Response'
