upstream app {
    server app:8080;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name api.hology.id;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# SSL server
server {
    listen 443 ssl;
    server_name api.hology.id;

    resolver 127.0.0.11 valid=10s;

    ssl_certificate /etc/letsencrypt/live/api.hology.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hology.id/privkey.pem;

    # Hanya izinkan cloudflare (opsional)
    allow 173.245.48.0/20;
    allow 103.21.244.0/22;
    allow 103.22.200.0/22;
    allow 103.31.4.0/22;
    allow 141.101.64.0/18;
    allow 108.162.192.0/18;
    allow 190.93.240.0/20;
    allow 188.114.96.0/20;
    allow 197.234.240.0/22;
    allow 198.41.128.0/17;
    allow 162.158.0.0/15;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 172.64.0.0/13;
    allow 131.0.72.0/22;
    deny all;

    client_max_body_size 500M;

    location / {        
        proxy_pass http://app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @redirect {
        return 301 https://hology.ub.ac.id/;
    }
}
